apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: gitlab-cli
  title: GitLab CLI (Test Tool)
  description: 基于 GitLab 官方 Go SDK 开发的 GitLab 用户与项目自动化管理工具，主要用于集成测试和 e2e 测试流程中批量创建用户、组、项目等测试数据。不随产品发布。
  tags:
    - test-tool
    - internal-tool
    - gitlab
    - go
  links:
    - url: https://github.com/AlaudaDevops/gitlab-cli
      title: GitHub Repository
      icon: github
  annotations:
    # github plugin
    github.com/project-slug: AlaudaDevops/gitlab-cli
    # backstage techdocs plugin — dir:../ points to the repo root from .catalog/
    backstage.io/techdocs-ref: dir:../
    acp.cpaas.io/owner: huanyang@alauda.io
    # internal — used only in test automation, not shipped to customers
    acp.cpaas.io/functional-attributes: internal

spec:
  type: tool
  system: system:alauda-devops-internal
  lifecycle: experimental
  owner: devops
